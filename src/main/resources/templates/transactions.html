<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Transaction History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

	body{
	font-family:Poppins;
	background:#0f172a;
	padding:40px;
	color:white;
	}

	/* Title */
	h3{
	color:#00e5ff;
	margin-bottom:25px;
	}

	/* REMOVE WHITE BACKGROUND */
	.table{
	background:transparent !important;
	color:white;
	border-collapse:collapse;
	}

	/* Header */
	.table thead{
	background:#1e293b;
	color:white;
	}

	/* Rows */
	.table tbody tr{
	background:transparent;
	border-bottom:1px solid #334155;
	}

	/* REMOVE BOOTSTRAP WHITE */
	.table > :not(caption) > * > *{
	background:transparent !important;
	color:white !important;
	}

	/* Hover */
	.table-hover tbody tr:hover{
	background:#1e293b !important;
	}

	/* Amount Colors */
	.amount-credit{
	color:#00e676;
	font-weight:600;
	}

	.amount-debit{
	color:#ff5252;
	font-weight:600;
	}

	/* Status */
	.status-success{
	color:white;
	background:#00c853;
	padding:5px 12px;
	border-radius:10px;
	font-size:13px;
	}

	/* Back Button */
	.btn-back{
	background:#00e5ff;
	color:black;
	border:none;
	padding:10px 20px;
	border-radius:10px;
	font-weight:600;
	margin-top:20px;
	transition:0.3s;
	}

	.btn-back:hover{
	background:#00bcd4;
	}

</style>

</head>

<body>

<div class="container">

<h3><i class="fa fa-history"></i> Transaction History</h3>

<table class="table table-hover">

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody>

<tr th:each="txn : ${transactions}">

<td th:text="${#temporals.format(txn.transactionDate, 'dd-MM-yyyy HH:mm')}"></td>

<td th:text="${txn.transactionType}"></td>

<td>

<span th:if="${txn.transactionType == 'DEPOSIT'}" class="amount-credit">
+ <span th:text="${txn.amount}"></span>
</span>

<span th:if="${txn.transactionType == 'WITHDRAW'}" class="amount-debit">
- <span th:text="${txn.amount}"></span>
</span>

<span th:if="${txn.transactionType == 'TRANSFER'}">
<span th:text="${txn.amount}"></span>
</span>

</td>

<td><span class="status-success">Success</span></td>

</tr>

</tbody>

</table>

<a href="/dashboard" class="btn btn-back">Back</a>

</div>

</body>

</html>
