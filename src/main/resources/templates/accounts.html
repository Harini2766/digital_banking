<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>My Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Poppins;
}
.card span{
color:white !important;
}
.card{
background:#1e293b;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}
.card, .stat-box, p, span, h3, h5 {
color: white !important;
}

.stat-box{
background:#334155;
padding:15px;
border-radius:15px;
text-align:center;
}
.chart-container {
    height: 250px;
}

h2{
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container mt-4">

<h2>My Account</h2>

<!-- Account Info -->
<div class="card">
<p><b>Account Number:</b> <span th:text="${account.accountNumber}"></span></p>
<p><b>Account Type:</b> <span th:text="${account.accountType}"></span></p>
<p><b>Status:</b> <span th:text="${account.status}"></span></p>
<p><b>Balance:</b> ₹ <span th:text="${account.balance}"></span></p>
</div>

<!-- Stats -->
<div class="row">

<div class="col-md-4">
<div class="stat-box">
<h5>Total Deposits</h5>
<h3 th:text="${totalDeposit}"></h3>
</div>
</div>

<div class="col-md-4">
<div class="stat-box">
<h5>Total Withdrawals</h5>
<h3 th:text="${totalWithdraw}"></h3>
</div>
</div>

<div class="col-md-4">
<div class="stat-box">
<h5>Total Transactions</h5>
<h3 th:text="${transactionCount}"></h3>
</div>
</div>

</div>

<br>

<!-- Last Login -->
<div class="card">
<p><b>Last Login:</b> <span th:text="${lastLogin}"></span></p>
</div>

<!-- Chart -->
<div class="card">
	<h5>
	Transactions - 
	<span th:text="${#dates.format(#dates.createNow(), 'MMMM')}"></span>
	</h5>
	<div class="chart-container">
	    <canvas id="txnChart"></canvas>
	</div>
</div>

<!-- PDF -->


<a href="/dashboard" class="btn btn-light">Back</a>

</div>

<!-- ✅ FIXED SCRIPT -->
<script th:inline="javascript">
/*<![CDATA[*/

let labels = [[${chartDates}]];
let data = [[${chartCounts}]];

const ctx = document.getElementById('txnChart');

new Chart(ctx, {
    type: 'bar',   // 🔥 BAR GRAPH (clearer)
    data: {
        labels: labels,
        datasets: [{
            label: 'Transactions Count',
            data: data,
            backgroundColor: '#00e5ff'
        }]
    },
	options: {
		animation: {   // 🔥 ADD HERE
		           duration: 1500
		       },

	    responsive: true,
	    maintainAspectRatio: false,   // 🔥 IMPORTANT

	    plugins: {
	        legend: {
	            labels: { color: 'white' }
	        }
	    },

	    scales: {
	        x: {
	            ticks: { color: 'white' }
	        },
			y: {
			    ticks: {
			        color: 'white',
			        precision: 0   // no decimals
			    },
			    beginAtZero: true
			}
	    }
	}
});

/*]]>*/
</script>

</body>
</html>
