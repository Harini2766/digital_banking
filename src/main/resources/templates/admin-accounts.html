<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin - Accounts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#0f172a; color:white; font-family:Poppins; }
.table{ color:white; }
input[type="text"]{
    background:#1f2937;
    color:white;
    border: 1px solid #374151;
    padding:5px 10px;
    border-radius:5px;
    width:100%;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="container mt-4">
<h2>All Accounts</h2>

<input type="text" id="searchAccount" placeholder="Search by account number" />

<table class="table table-dark table-hover" id="accountTable">
<thead>
<tr>
<th>ID</th>
<th>Account Number</th>
<th>Balance</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr th:each="acc : ${accounts}">
<td th:text="${acc.id}"></td>
<td th:text="${acc.accountNumber}"></td>
<td th:text="${acc.balance}"></td>
<td th:text="${acc.status}"></td>

<td>
    <a th:href="@{'/admin/account/toggle/' + ${acc.id}}" class="btn btn-warning btn-sm">Toggle</a>
</td>
</tr>
</tbody>
</table>

<a href="/admin/dashboard" class="btn btn-light mt-2">Back</a>
</div>

<script>
// ✅ Real-time filtering for Accounts
const accountSearch = document.getElementById('searchAccount');
const accountTable = document.getElementById('accountTable').getElementsByTagName('tbody')[0];

accountSearch.addEventListener('keyup', function() {
    const filter = this.value.toLowerCase();
    Array.from(accountTable.rows).forEach(row => {
        const accNo = row.cells[1].textContent.toLowerCase();
        row.style.display = accNo.includes(filter) ? '' : 'none';
    });
});
</script>

</body>
</html>
