<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Digital Bank Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
}

/* Sidebar */
.sidebar{
height:100vh;
background:#1f2937;
color:white;
padding-top:30px;
position:fixed;
width:220px;
}
.sidebar h3{
text-align:center;
margin-bottom:40px;
color:#00e5ff;
}
.sidebar a{
display:block;
color:white;
padding:12px 25px;
text-decoration:none;
}
.sidebar a:hover{
background:#374151;
}

/* Main Content */
.main{
margin-left:220px;
padding:30px;
}

/* Balance Card */
.balance-card{
background:linear-gradient(135deg,#00e5ff,#0072ff);
color:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Action Cards */
.action-card{
background:#1e293b;
border-radius:15px;
padding:20px;
text-align:center;
transition:0.3s;
color:white;
cursor:pointer;
}

.action-card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.5);
background:#334155;
}

/* Table Fix (REMOVE WHITE) */
.table{
color:white;
background:transparent !important;
}

.table thead{
background:#1e293b;
}

.table tbody tr{
border-bottom:1px solid #334155;
}

.table > :not(caption) > * > *{
background:transparent !important;
color:white !important;
}

.table-hover tbody tr:hover{
background:#1e293b !important;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h3>MyBank</h3>
<a href="/dashboard">Dashboard</a>
<a href="/accounts">Accounts</a>
<a href="/deposit">Deposit</a>
<a href="/withdraw">Withdraw</a>
<a href="/transfer">Transfer</a>
<a href="/transactions">Transactions</a>
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

<h2 style="color:#00e5ff;">Welcome to Digital Banking</h2>
<br>

<!-- Balance Card -->
<div class="balance-card">
<h4>Account Balance</h4>
<h1>₹ <span th:text="${balance}"></span></h1>
</div>

<br><br>

<!-- Action Buttons -->
<div class="row">
<div class="col-md-4">
<div class="action-card">
<i class="fa fa-plus fa-2x text-success"></i>
<h5 class="mt-2">Deposit</h5>
</div>
</div>

<div class="col-md-4">
<div class="action-card">
<i class="fa fa-minus fa-2x text-danger"></i>
<h5 class="mt-2">Withdraw</h5>
</div>
</div>

<div class="col-md-4">
<div class="action-card">
<i class="fa fa-paper-plane fa-2x text-info"></i>
<h5 class="mt-2">Transfer</h5>
</div>
</div>
</div>

<br><br>

<!-- Transaction Table -->
<h4 style="color:#00e5ff;">Recent Transactions</h4>

<table class="table table-hover">

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody>
<tr th:each="txn : ${transactions}">
<td th:text="${#temporals.format(txn.transactionDate, 'dd-MM-yyyy HH:mm')}"></td>
<td th:text="${txn.transactionType}"></td>
<td>₹ <span th:text="${txn.amount}"></span></td>
<td><span style="background:#00c853;padding:5px 10px;border-radius:10px;">Success</span></td>
</tr>
</tbody>

</table>

</div>

</body>
</html>
