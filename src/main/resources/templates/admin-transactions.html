<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin - Transactions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f172a;
color:white;
font-family:Poppins;
}
.table{
color:white;
}
</style>

</head>
<body>

<div class="container mt-4">

<h2>All Transactions</h2>

<!-- ✅ FILTER UI ADDED -->
<form method="get" action="/admin/transactions" class="mb-3">

<select name="type" class="form-select" style="width:200px;display:inline;">
<option value="">All</option>
<option value="DEPOSIT">Deposit</option>
<option value="WITHDRAW">Withdraw</option>
<option value="TRANSFER">Transfer</option>
</select>

<button class="btn btn-primary">Filter</button>

</form>

<table class="table table-dark table-hover">

<thead>
<tr>
<th>ID</th>
<th>Type</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody>
<tr th:each="txn : ${transactions}">
<td th:text="${txn.id}"></td>
<td th:text="${txn.transactionType}"></td>
<td th:text="${txn.amount}"></td>
<td th:text="${#temporals.format(txn.transactionDate, 'dd-MM-yyyy HH:mm')}"></td>
</tr>
</tbody>

</table>

<a href="/admin/dashboard" class="btn btn-light">Back</a>

</div>

</body>
</html>
