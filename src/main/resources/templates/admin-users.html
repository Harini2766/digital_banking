<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin - Users</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#0f172a; color:white; font-family:Poppins; }
.table{ color:white; }
input[type="text"]{
    background:#1f2937;
    color:white;
    border: 1px solid #374151;
    padding:5px 10px;
    border-radius:5px;
    width:100%;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="container mt-4">
<h2>All Users</h2>

<input type="text" id="searchUser" placeholder="Search by name" />

<table class="table table-dark table-hover" id="userTable">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr th:each="user : ${users}">
<td th:text="${user.id}"></td>
<td th:text="${user.name}"></td>
<td th:text="${user.email}"></td>
<td th:text="${user.role}"></td>

<td>
    <a th:href="@{'/admin/user/toggle/' + ${user.id}}" class="btn btn-warning btn-sm">Toggle</a>
    <a th:href="@{'/admin/user/delete/' + ${user.id}}" class="btn btn-danger btn-sm"
       onclick="return confirm('Delete user?')">Delete</a>
</td>
</tr>
</tbody>
</table>

<a href="/admin/dashboard" class="btn btn-light mt-2">Back</a>
</div>

<script>
// ✅ Real-time filtering for Users
const userSearch = document.getElementById('searchUser');
const userTable = document.getElementById('userTable').getElementsByTagName('tbody')[0];

userSearch.addEventListener('keyup', function() {
    const filter = this.value.toLowerCase();
    Array.from(userTable.rows).forEach(row => {
        const name = row.cells[1].textContent.toLowerCase();
        row.style.display = name.includes(filter) ? '' : 'none';
    });
});
</script>

</body>
</html>
