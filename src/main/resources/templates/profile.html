<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f172a;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* Container */
.profile-container{
display:flex;
gap:30px;
}

/* Cards */
.card-box{
background:#1e293b;
padding:35px;
border-radius:20px;
width:400px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* Title */
.card-box h3{
text-align:center;
margin-bottom:25px;
color:#00e5ff;
}

/* Info styling */
.info{
margin-bottom:18px;
font-size:16px;
}

.label{
font-weight:600;
color:#94a3b8;
}

.value{
color:white;
margin-left:5px;
}

/* Input */
.form-control{
background:#0f172a;
border:1px solid #475569;
color:white;
}

.form-control::placeholder{
color:#94a3b8;
}

/* Button */
.btn-update{
background:#00e5ff;
color:black;
border:none;
width:100%;
padding:12px;
border-radius:10px;
font-weight:600;
transition:0.3s;
}

.btn-update:hover{
background:#00bcd4;
transform:scale(1.05);
}

/* Alerts */
.alert-success{
color:#00e676;
text-align:center;
margin-bottom:10px;
}

.alert-error{
color:#ff5252;
text-align:center;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="profile-container">

<!-- ================= LEFT CARD ================= -->
<div class="card-box">

<h3>My Profile</h3>

<p th:if="${success}" th:text="${success}" class="alert-success"></p>
<p th:if="${error}" th:text="${error}" class="alert-error"></p>

<div class="info">
<span class="label">Username:</span>
<span class="value" th:text="${user.name}"></span>
</div>

<div class="info">
<span class="label">Email:</span>
<span class="value" th:text="${user.email}"></span>
</div>

<div class="info">
<span class="label">Phone:</span>
<span class="value" th:text="${user.phone}"></span>
</div>

<div class="info">
<span class="label">Account Number:</span>
<span class="value" th:text="${account.accountNumber}"></span>
</div>

<br>

<a href="/dashboard" class="btn btn-update">Back</a>

</div>

<!-- ================= RIGHT CARD ================= -->
<div class="card-box">

<h3>Change Password</h3>

<form action="/users/change-password" method="post">

<div class="mb-3">
<input type="password" name="oldPassword" class="form-control" placeholder="Old Password" required>
</div>

<div class="mb-3">
<input type="password" name="newPassword" class="form-control" placeholder="New Password" required>
</div>

<button class="btn btn-update">Update Password</button>

</form>

</div>

</div>

</body>
</html>
