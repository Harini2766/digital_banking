<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#0f172a;
    color:white;
}

.sidebar{
    height:100vh;
    width:230px;
    background:#111827;
    color:white;
    position:fixed;
    padding-top:30px;
}

.sidebar h3{
    text-align:center;
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px 25px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#374151;
}

.main{
    margin-left:230px;
    padding:30px;
}

.card-stat{
    padding:25px;
    border-radius:15px;
    color:white;
}

.users{background:#2962ff;}
.accounts{background:#00c853;}
.transactions{background:#ff9100;}

.table-dark-custom {
    width: 100%;
    background-color: #111827; 
    color: white;
    border-collapse: collapse;
}

.table-dark-custom thead {
    background-color: #1f2937;
    color: white;
}

.table-dark-custom tbody tr {
    background-color: #111827;
    color: white;
}

.table-dark-custom tbody tr:nth-of-type(even) {
    background-color: #111827;
}

.table-dark-custom tbody tr:hover {
    background-color: #374151;
}

.table-dark-custom th,
.table-dark-custom td {
    border: 1px solid #374151;
    padding: 10px;
}

.text-success { color: #00c853; }
.text-danger { color: #ff5252; }
</style>
</head>
<body>

<div class="sidebar">
<h3>Bank Admin</h3>
<a href="/admin/dashboard"><i class="fa fa-home"></i> Dashboard</a>
<a href="/admin/users"><i class="fa fa-users"></i> Users</a>
<a href="/admin/accounts"><i class="fa fa-wallet"></i> Accounts</a>
<a href="/admin/transactions"><i class="fa fa-history"></i> Transactions</a>
<a href="/admin/logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
<h2>Admin Control Panel</h2>
<br>

<div class="row">
<div class="col-md-4">
    <div class="card-stat users">
        <h4>Total Users</h4>
        <h2 th:text="${userCount}"></h2>
    </div>
</div>

<div class="col-md-4">
    <div class="card-stat accounts">
        <h4>Total Accounts</h4>
        <h2 th:text="${accountCount}"></h2>
    </div>
</div>

<div class="col-md-4">
    <div class="card-stat transactions">
        <h4>Total Transactions</h4>
        <h2 th:text="${transactionCount}"></h2>
    </div>
</div>
</div>

<br><br>

<h4>Recent Users</h4>
<table class="table-dark-custom">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
</tr>
</thead>

<tbody>
<tr th:each="user : ${users}">
    <td th:text="${user.id}"></td>
    <td th:text="${user.name}"></td>
    <td th:text="${user.email}"></td>
    <td>
        <span th:text="${user.status}" th:classappend="${user.status == 'ACTIVE'} ? 'text-success' : 'text-danger'"></span>
    </td>
</tr>
</tbody>
</table>

</div>
</body>
</html>
