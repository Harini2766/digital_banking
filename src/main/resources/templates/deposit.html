<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Deposit Money</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f172a;   /* 🔥 same as accounts page */
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card-box{
background:#1e293b;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.card-box h2{
text-align:center;
margin-bottom:25px;
color:#00e5ff;
}

/* 🔥 Account display */
.account-box{
background:#334155;
padding:12px;
border-radius:10px;
margin-bottom:20px;
text-align:center;
font-weight:500;
}

.form-control{
background:#0f172a;
border:1px solid #475569;
color:white;
}

.form-control::placeholder{
color:#94a3b8;
}
.btn-back{
background:#64748b;
color:white;
border:none;
width:100%;
padding:12px;
border-radius:10px;
font-weight:600;
transition:0.3s;
}

.btn-back:hover{
background:#475569;
transform:scale(1.05);
}

.btn-deposit{
background:#00e5ff;
color:black;
border:none;
width:100%;
padding:12px;
border-radius:10px;
font-weight:600;
transition:0.3s;
}

.btn-deposit:hover{
background:#00bcd4;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="card-box">

<h2><i class="fa fa-plus-circle"></i> Deposit Money</h2>

<!-- 🔥 Account Number Display -->
<div class="account-box">
Account Number: 
<span th:text="${account.accountNumber}"></span>
</div>

<form action="/deposit" method="post">

<!-- hidden field (important for backend if needed later) -->
<input type="hidden" name="accountNumber" th:value="${account.accountNumber}">

<div class="mb-3">
<label>Amount</label>
<input type="number" name="amount" class="form-control" placeholder="Enter amount" required>
</div>

<button class="btn btn-deposit">Deposit</button>
<button type="button" onclick="goBack()" class="btn-back mt-2">Back</button>
</form>

</div>
<script>
function goBack(){
    window.location.href = "/dashboard";
}
</script>
</body>
</html>
